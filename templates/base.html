<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>nusu - Social Finance App</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Edu+TAS+Beginner:wght@400..700&family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link rel="stylesheet" href="{% static 'css/lib/animate/animate.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/lib/lightbox/css/lightbox.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/lib/owlcarousel/assets/owl.carousel.min.css' %}">
    
    <!-- Customized Bootstrap Stylesheet -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    
    <!-- Template Stylesheet -->
    <link rel="stylesheet" href="{% static 'css/style1.css' %}">
    <link rel="stylesheet" href="{% static 'css/style3.css' %}">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}"> <!-- Custom styles -->
</head>

<body>
    <!-- Spinner -->
    <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <!-- Navbar Start -->
    <div class="container-fluid nav-section border-0">
        <nav class="navbar navbar-light">
            <div class="navbar-nav flex-column">
                <a href="{% url 'home' %}" class="nav-item nav-link active"><span class="fa fa-home"></span> Home</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'users:dashboard' %}" class="nav-item nav-link"><span class="fas fa-tachometer-alt"></span> Dashboard</a>
                    <a href="{% url 'airdrop:dashboard' %}" class="nav-item nav-link"><span class="fas fa-digging"></span> Mining</a>
                    <a href="{% url 'transactions:public_ledger' %}" class="nav-item nav-link"><span class="fas fa-book"></span> Ledger</a>
                    <a href="{% url 'users:user_profile' user.username %}" class="nav-item nav-link"><span class="fas fa-user"></span> Profile</a>
                    {% if user.is_superuser %}
                        <a href="{% url 'users:admin_balances' %}" class="nav-item nav-link"><span class="fas fa-coins"></span> Admin</a>
                        <a href="{% url 'users:create_agent' %}" class="nav-item nav-link"><span class="fas fa-user-plus"></span> Create Agent</a>
                    {% endif %}
                    <a href="{% url 'users:logout' %}" class="nav-item nav-link"><span class="fas fa-sign-out-alt"></span> Logout</a>
                {% else %}
                    <a href="{% url 'users:login' %}" class="nav-item nav-link"><span class="fas fa-sign-in-alt"></span> Login</a>
                    <a href="{% url 'users:register' %}" class="nav-item nav-link"><span class="fas fa-user-plus"></span> Register</a>
                {% endif %}
            </div>
        </nav>
    </div>
    <!-- Navbar End -->
    
    {% block content %}{% endblock %}

    <!-- Back to Top -->
    <a href="#" class="btn btn-primary btn-lg-square back-to-top"><i class="fa fa-arrow-up"></i></a>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'css/lib/wow/wow.min.js' %}"></script>
    <script src="{% static 'css/lib/easing/easing.min.js' %}"></script>
    <script src="{% static 'css/lib/waypoints/waypoints.min.js' %}"></script>
    <script src="{% static 'css/lib/counterup/counterup.min.js' %}"></script>
    <script src="{% static 'css/lib/lightbox/js/lightbox.min.js' %}"></script>    
    <script src="{% static 'css/lib/owlcarousel/owl.carousel.min.js' %}"></script>
    <script src="{% static 'js/main1.js' %}"></script>
    
    {% block extra_scripts %}{% endblock %}
    
    <script>
        // Spinner
        var spinner = function () {
            setTimeout(function () {
                if ($('#spinner').length > 0) {
                    $('#spinner').removeClass('show');
                }
            }, 1);
        };
        spinner();
        
        // Initiate the wowjs
        new WOW().init();
    </script>
</body>
</html>
