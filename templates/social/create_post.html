{% extends "base.html" %}
{% load static %}

{% block title %}Create Post - NUSU Social{% endblock %}

{% block extra_css %}
<style>
    .create-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
    }
    
    .create-card {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 20px;
    }
    
    .post-type-selector {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }
    
    .post-type-btn {
        flex: 1;
        padding: 12px;
        background: rgba(255,255,255,0.1);
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.2s;
    }
    
    .post-type-btn.active {
        background: #fe2c55;
    }
    
    #content {
        width: 100%;
        min-height: 120px;
        background: rgba(255,255,255,0.1);
        border: none;
        border-radius: 10px;
        padding: 15px;
        color: white;
        font-size: 16px;
        resize: vertical;
    }
    
    #content::placeholder {
        color: rgba(255,255,255,0.5);
    }
    
    .file-picker-btn {
        width: 100%;
        padding: 15px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 15px;
        font-size: 16px;
    }
    
    .file-preview-modal {
        margin-top: 15px;
        display: none;
    }
    
    .file-preview-modal.active {
        display: block;
    }
    
    .thumbnail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
        max-height: 300px;
        overflow-y: auto;
        margin-top: 10px;
    }
    
    .thumbnail-item {
        position: relative;
        border-radius: 10px;
        overflow: hidden;
        aspect-ratio: 1;
        cursor: pointer;
        background: #1a1a1a;
    }
    
    .thumbnail-item img, .thumbnail-item video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    
    .thumbnail-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0,0,0,0.7);
        color: white;
        font-size: 10px;
        padding: 4px;
        text-align: center;
    }
    
    .remove-file {
        position: absolute;
        top: 5px;
        right: 5px;
        background: rgba(0,0,0,0.7);
        color: white;
        border: none;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
    }
    
    .remove-file:hover {
        background: #fe2c55;
    }
    
    .trim-controls {
        background: rgba(0,0,0,0.5);
        border-radius: 10px;
        padding: 15px;
        margin-top: 15px;
        display: none;
    }
    
    .trim-controls.active {
        display: block;
    }
    
    .trim-slider {
        width: 100%;
        margin: 10px 0;
    }
    
    .template-selector {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
        gap: 10px;
        margin-top: 10px;
    }
    
    .template-option {
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
        padding: 8px;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
    }
    
    .template-option.selected {
        background: #fe2c55;
        transform: scale(1.05);
    }
    
    .template-preview {
        width: 100%;
        height: 60px;
        border-radius: 8px;
        margin-bottom: 5px;
    }
    
    .style-options {
        margin-top: 15px;
        padding: 15px;
        background: rgba(0,0,0,0.3);
        border-radius: 10px;
    }
    
    .style-row {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
    }
    
    .style-row select, .style-row input {
        flex: 1;
        padding: 8px;
        border-radius: 8px;
        background: rgba(0,0,0,0.5);
        border: none;
        color: white;
    }
    
    .submit-btn {
        width: 100%;
        padding: 15px;
        background: #fe2c55;
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 20px;
        font-size: 18px;
    }
    
    .submit-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    
    .progress-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.95);
        z-index: 1000;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    
    .progress-bar {
        width: 300px;
        height: 30px;
        background: #333;
        border-radius: 15px;
        overflow: hidden;
        margin-top: 20px;
    }
    
    .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #fe2c55, #ff6b6b);
        transition: width 0.3s;
    }
    
    .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #333;
        border-top: 4px solid #fe2c55;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    .back-btn {
        display: inline-block;
        margin-bottom: 20px;
        color: white;
        text-decoration: none;
        background: rgba(0,0,0,0.5);
        padding: 8px 16px;
        border-radius: 30px;
    }
    
    .back-btn:hover {
        background: rgba(0,0,0,0.7);
        color: white;
    }
</style>
{% endblock %}

{% block content %}
<div class="create-container">
    <a href="{% url 'social:feed' %}" class="back-btn">← Back to Feed</a>
    
    <div class="create-card">
        <h2 style="margin-bottom: 20px;">Create Post</h2>
        
        <div class="post-type-selector">
            <button type="button" class="post-type-btn" data-type="text">📝 Text</button>
            <button type="button" class="post-type-btn active" data-type="media">📷 Media</button>
            <button type="button" class="post-type-btn" data-type="mixed">✨ Mixed</button>
        </div>
        
        <textarea id="content" placeholder="What's on your mind?"></textarea>
        
        <button class="file-picker-btn" id="uploadBtn">📁 Select Media</button>
        <input type="file" id="fileInput" accept="video/*,image/*,audio/*" style="display: none;" multiple>
        
        <div class="file-preview-modal" id="filePreviewModal">
            <div class="thumbnail-grid" id="thumbnailGrid"></div>
        </div>
        
        <div class="trim-controls" id="trimControls">
            <h4>✂️ Trim Video</h4>
            <label>Start: <span id="startVal">0.0</span>s</label>
            <input type="range" id="trimStart" class="trim-slider" step="0.1" min="0" value="0">
            <label>End: <span id="endVal">0.0</span>s</label>
            <input type="range" id="trimEnd" class="trim-slider" step="0.1" min="0" value="0">
        </div>
        
        <div id="textOptions" style="display: none;">
            <div class="style-options">
                <h4>🎨 Background Template</h4>
                <div class="template-selector" id="templateSelector"></div>
                
                <div class="style-row">
                    <select id="textAlignment">
                        <option value="left">Left</option>
                        <option value="center" selected>Center</option>
                        <option value="right">Right</option>
                    </select>
                    <input type="color" id="textColor" value="#ffffff">
                </div>
                
                <select id="textFont" style="width:100%; padding:8px; border-radius:8px;">
                    <option value="default">Default Font</option>
                    <option value="bold">Bold</option>
                    <option value="handwriting">Handwriting</option>
                </select>
                
                <input type="text" id="songName" placeholder="Song name" value="Original Audio" style="width:100%; margin-top:10px; padding:8px; border-radius:8px; background:rgba(0,0,0,0.5); border:none; color:white;">
            </div>
        </div>
        
        <button class="submit-btn" id="submitBtn">🚀 Post</button>
    </div>
</div>

<div class="progress-overlay" id="progressOverlay">
    <div class="spinner"></div>
    <h3>Uploading to Cloudinary...</h3>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">Preparing upload...</div>
</div>

<script>
    // EXACT pattern from working feed app
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const thumbnailGrid = document.getElementById('thumbnailGrid');
    const filePreviewModal = document.getElementById('filePreviewModal');
    const trimControls = document.getElementById('trimControls');
    const trimStart = document.getElementById('trimStart');
    const trimEnd = document.getElementById('trimEnd');
    const startVal = document.getElementById('startVal');
    const endVal = document.getElementById('endVal');
    const submitBtn = document.getElementById('submitBtn');
    const progressOverlay = document.getElementById('progressOverlay');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const contentField = document.getElementById('content');
    
    let selectedFiles = [];
    let currentFile = null;
    let objectUrl = null;
    let currentVideoDuration = 0;
    
    // Post type selection
    const postTypeBtns = document.querySelectorAll('.post-type-btn');
    const textOptions = document.getElementById('textOptions');
    
    postTypeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            postTypeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const type = btn.dataset.type;
            if (type === 'text') {
                textOptions.style.display = 'block';
                filePreviewModal.classList.remove('active');
                contentField.placeholder = "What's on your mind?";
                contentField.required = true;
            } else if (type === 'media') {
                textOptions.style.display = 'none';
                contentField.placeholder = "Add a caption (optional)";
                contentField.required = false;
            } else {
                textOptions.style.display = 'block';
                contentField.placeholder = "What's on your mind? (optional)";
                contentField.required = false;
            }
        });
    });
    
    // Upload button
    uploadBtn.onclick = () => {
        fileInput.click();
    };
    
    // Generate thumbnail (from feed app)
    function generateThumbnail(file) {
        return new Promise((resolve) => {
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            } else if (file.type.startsWith('video/')) {
                const video = document.createElement('video');
                const url = URL.createObjectURL(file);
                video.src = url;
                video.currentTime = 1;
                video.addEventListener('loadeddata', () => {
                    setTimeout(() => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 200;
                        canvas.height = 200;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const thumbnail = canvas.toDataURL('image/jpeg', 0.5);
                        URL.revokeObjectURL(url);
                        resolve(thumbnail);
                    }, 100);
                });
            } else {
                resolve(null);
            }
        });
    }
    
    // Update thumbnail grid (from feed app)
    async function updateThumbnailGrid() {
        if (selectedFiles.length === 0) {
            thumbnailGrid.innerHTML = '<div style="text-align:center; padding:20px; color:#666;">No files selected</div>';
            filePreviewModal.classList.remove('active');
            return;
        }
        
        filePreviewModal.classList.add('active');
        thumbnailGrid.innerHTML = '';
        
        for (let i = 0; i < Math.min(selectedFiles.length, 12); i++) {
            const file = selectedFiles[i];
            const thumbnail = await generateThumbnail(file);
            const fileSizeMB = (file.size / (1024 * 1024)).toFixed(1);
            
            const thumbnailItem = document.createElement('div');
            thumbnailItem.className = 'thumbnail-item';
            
            if (thumbnail) {
                thumbnailItem.innerHTML = `
                    <img src="${thumbnail}" alt="${file.name}">
                    <div class="thumbnail-overlay">
                        ${file.type.split('/')[0]} • ${fileSizeMB}MB
                    </div>
                    <button class="remove-file" data-index="${i}">✕</button>
                `;
            } else {
                thumbnailItem.innerHTML = `
                    <div style="background: #333; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 30px;">
                        🎵
                    </div>
                    <div class="thumbnail-overlay">
                        Audio • ${fileSizeMB}MB
                    </div>
                    <button class="remove-file" data-index="${i}">✕</button>
                `;
            }
            
            thumbnailItem.onclick = (function(f) {
                return function(e) {
                    if (e.target.classList.contains('remove-file')) return;
                    currentFile = f;
                    objectUrl = URL.createObjectURL(f);
                    showPreview(f);
                };
            })(file);
            
            thumbnailGrid.appendChild(thumbnailItem);
        }
        
        // Add remove handlers
        document.querySelectorAll('.remove-file').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const index = parseInt(btn.dataset.index);
                selectedFiles.splice(index, 1);
                updateThumbnailGrid();
                if (selectedFiles.filter(f => f.type.startsWith('video/')).length === 0) {
                    trimControls.classList.remove('active');
                }
            };
        });
    }
    
    // Show preview (from feed app)
    function showPreview(file) {
        if (file.type.startsWith('video/')) {
            const video = document.createElement('video');
            video.src = objectUrl;
            video.controls = true;
            video.style.maxWidth = '100%';
            video.style.maxHeight = '300px';
            
            video.onloadedmetadata = () => {
                currentVideoDuration = video.duration;
                trimStart.max = video.duration;
                trimEnd.max = video.duration;
                trimEnd.value = video.duration;
                endVal.textContent = video.duration.toFixed(1);
                trimControls.classList.add('active');
            };
            
            // Show in a modal or alert - for simplicity, just activate trim
            alert(`Video loaded: ${file.name}\nDuration: ${(video.duration || 0).toFixed(1)}s\nYou can now set trim points below.`);
        }
    }
    
    // File input change (from feed app)
    fileInput.onchange = function() {
        const files = Array.from(this.files);
        const remaining = 4 - selectedFiles.length;
        const newFiles = files.slice(0, remaining);
        
        // Filter by size
        const validFiles = newFiles.filter(f => (f.size / (1024 * 1024)) <= 90);
        
        if (validFiles.length < newFiles.length) {
            alert('Some files exceed 90MB limit and were skipped');
        }
        
        selectedFiles = [...selectedFiles, ...validFiles];
        updateThumbnailGrid();
        fileInput.value = '';
    };
    
    // Trim controls
    trimStart.oninput = () => {
        startVal.textContent = parseFloat(trimStart.value).toFixed(1);
    };
    
    trimEnd.oninput = () => {
        endVal.textContent = parseFloat(trimEnd.value).toFixed(1);
    };
    
    // Get CSRF token (from feed app)
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    // Submit post (EXACT pattern from feed app)
    submitBtn.onclick = async () => {
        const activeType = document.querySelector('.post-type-btn.active').dataset.type;
        const content = contentField.value.trim();
        
        // Validate
        if (activeType === 'text' && !content) {
            alert('Please enter text content');
            return;
        }
        
        if (activeType === 'media' && selectedFiles.length === 0) {
            alert('Please select media files');
            return;
        }
        
        // Use first file if multiple
        const fileToUpload = selectedFiles[0];
        
        if (!fileToUpload && activeType !== 'text') {
            alert('No file selected');
            return;
        }
        
        const formData = new FormData();
        formData.append('content', content);
        formData.append('post_type', activeType);
        formData.append('text_alignment', document.getElementById('textAlignment').value);
        formData.append('text_color', document.getElementById('textColor').value);
        formData.append('text_font', document.getElementById('textFont').value);
        formData.append('song_name', document.getElementById('songName').value);
        formData.append('background_template', '');
        formData.append('trim_start', trimStart.value);
        formData.append('trim_end', trimEnd.value);
        
        if (fileToUpload) {
            formData.append('file_data', fileToUpload);
            formData.append('file_name', fileToUpload.name);
            formData.append('file_type', fileToUpload.type);
        }
        
        // Show progress
        progressOverlay.style.display = 'flex';
        submitBtn.disabled = true;
        
        let progress = 0;
        const progressInterval = setInterval(() => {
            if (progress < 90) {
                progress += Math.random() * 10;
                if (progress > 90) progress = 90;
                progressFill.style.width = progress + '%';
                progressText.textContent = `Uploading... ${Math.floor(progress)}%`;
            }
        }, 200);
        
        try {
            const response = await fetch('{% url "social:create_post" %}', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': getCookie('csrftoken')
                }
            });
            
            clearInterval(progressInterval);
            
            const data = await response.json();
            
            if (data.success || data.status === 'success') {
                progressFill.style.width = '100%';
                progressText.textContent = 'Complete! Redirecting...';
                
                setTimeout(() => {
                    window.location.href = data.redirect_url || '{% url "social:feed" %}';
                }, 500);
            } else {
                throw new Error(data.error || 'Upload failed');
            }
        } catch (error) {
            clearInterval(progressInterval);
            progressOverlay.style.display = 'none';
            submitBtn.disabled = false;
            alert('Error: ' + error.message);
        }
    };
    
    // Load templates
    fetch('{% url "social:get_templates" %}')
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById('templateSelector');
            if (data.templates && data.templates.length) {
                data.templates.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'template-option';
                    div.innerHTML = `
                        <div class="template-preview" style="background: ${t.gradient_css || '#333'};"></div>
                        <div style="font-size: 11px;">${t.name}</div>
                    `;
                    div.onclick = () => {
                        document.querySelectorAll('.template-option').forEach(opt => opt.classList.remove('selected'));
                        div.classList.add('selected');
                    };
                    container.appendChild(div);
                });
            }
        });
</script>
{% endblock %}
