<!-- templates/chat/chat_detail.html - Fixed duplicate messages -->
{% extends 'base.html' %}
{% load static %}

{% block title %}{{ chat_name }} | NUSU{% endblock %}

{% block extra_css %}
<style>
.chat-detail-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 140px);
    background: var(--gray);
    border-radius: 20px;
    overflow: hidden;
}

.chat-detail-header {
    padding: 16px 20px;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}

.back-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.back-btn:hover {
    background: rgba(255,255,255,0.2);
}

.chat-detail-info {
    flex: 1;
}

.chat-detail-name {
    font-weight: 700;
    font-size: 1.1rem;
}

.chat-detail-type {
    font-size: 0.7rem;
    color: var(--text-dim);
}

.messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.message {
    display: flex;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.message-sent {
    justify-content: flex-end;
}

.message-received {
    justify-content: flex-start;
}

.message-bubble {
    max-width: 70%;
    padding: 10px 16px;
    border-radius: 20px;
    word-wrap: break-word;
}

.message-sent .message-bubble {
    background: var(--blue);
    color: white;
    border-bottom-right-radius: 4px;
}

.message-received .message-bubble {
    background: rgba(255,255,255,0.1);
    color: white;
    border-bottom-left-radius: 4px;
}

.message-time {
    font-size: 0.65rem;
    margin-top: 4px;
    opacity: 0.7;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 4px;
}

.message-system {
    text-align: center;
    margin: 8px 0;
}

.system-message {
    display: inline-block;
    background: rgba(255,255,255,0.05);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    color: var(--text-dim);
}

/* Message Status Indicators - Green and Blue */
.message-status {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    margin-left: 6px;
    font-size: 0.7rem;
}

.status-sent {
    color: #9ca3af;
}

.status-delivered {
    color: #10b981;
}

.status-read {
    color: #3b82f6;
}

.sending-indicator {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.65rem;
    color: #9ca3af;
}

.sending-indicator i {
    font-size: 0.5rem;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

.message-sending {
    opacity: 0.7;
}

.message-sending .message-bubble {
    background: rgba(59,130,246,0.5);
}

/* Voice Note Styles */
.voice-note {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 180px;
}

.play-voice-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: none;
    cursor: pointer;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.play-voice-btn:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.05);
}

.voice-waveform {
    flex: 1;
    height: 32px;
    background: linear-gradient(90deg, var(--blue) 0%, var(--indigo) 100%);
    opacity: 0.6;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
}

.voice-progress {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: rgba(255,255,255,0.3);
    width: 0%;
    transition: width 0.1s linear;
}

.voice-duration {
    font-size: 0.75rem;
    min-width: 40px;
}

/* Recording Modal */
.recording-modal {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(20px);
    border-radius: 60px;
    padding: 12px 20px;
    display: none;
    align-items: center;
    gap: 20px;
    z-index: 2000;
    border: 1px solid rgba(255,255,255,0.2);
    animation: slideUp 0.2s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
}

.recording-red-dot {
    width: 12px;
    height: 12px;
    background: #ef4444;
    border-radius: 50%;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.7; }
}

.recording-timer {
    font-family: monospace;
    font-size: 1.1rem;
    font-weight: bold;
    color: white;
    min-width: 60px;
}

.recording-actions {
    display: flex;
    gap: 12px;
    align-items: center;
}

.recording-cancel {
    background: rgba(239,68,68,0.2);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    color: #ef4444;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.recording-cancel:hover {
    background: #ef4444;
    color: white;
    transform: scale(1.05);
}

.recording-send {
    background: rgba(34,197,94,0.2);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    color: #22c55e;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.recording-send:hover {
    background: #22c55e;
    color: white;
    transform: scale(1.05);
}

.recording-send.disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* Chat Input Area */
.chat-input-area {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    gap: 12px;
    align-items: flex-end;
    background: var(--gray);
    flex-shrink: 0;
}

.chat-input-area textarea {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 10px 16px;
    color: white;
    resize: none;
    font-family: inherit;
    max-height: 100px;
    font-size: 0.9rem;
}

.chat-input-area textarea:focus {
    outline: none;
    border-color: var(--blue);
}

.chat-input-area button {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
}

.send-btn {
    background: var(--blue);
    color: white;
}

.send-btn:hover {
    transform: scale(1.05);
}

.record-btn {
    background: #ef4444;
    color: white;
}

.record-btn.recording {
    animation: pulse 1s infinite;
}

.loading-indicator {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
}
</style>
{% endblock %}

{% block content %}
<div class="chat-detail-container">
    <div class="chat-detail-header">
        <button class="back-btn" onclick="window.location.href='/chat/'">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="chat-detail-info">
            <div class="chat-detail-name" id="chatName">{{ chat_name }}</div>
            <div class="chat-detail-type">{{ chat_type|title }} Chat</div>
        </div>
    </div>
    
    <div class="messages-container" id="messagesContainer">
        <div class="loading-indicator">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Loading messages...</p>
        </div>
    </div>
    
    <div class="chat-input-area">
        <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
        <button id="recordBtn" class="record-btn" title="Record Voice Note">
            <i class="fas fa-microphone"></i>
        </button>
        <button id="sendBtn" class="send-btn">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<!-- Recording Modal -->
<div id="recordingModal" class="recording-modal">
    <div class="recording-red-dot"></div>
    <span>Recording</span>
    <span id="recordingTimer" class="recording-timer">0:00</span>
    <div class="recording-actions">
        <button id="cancelRecordingBtn" class="recording-cancel" title="Cancel">
            <i class="fas fa-times"></i>
        </button>
        <button id="sendRecordingBtn" class="recording-send" title="Send">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const chatId = {{ chat_id }};
let lastMessageTime = null;
let pollingInterval = null;
let mediaRecorder = null;
let audioChunks = [];
let recordingTimer = null;
let recordingSeconds = 0;
let currentStream = null;
let existingMessageIds = new Set(); // Track existing message IDs to prevent duplicates

// Load messages
async function loadMessages() {
    try {
        const response = await fetch(`/chat/${chatId}/api/`);
        const data = await response.json();
        
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        existingMessageIds.clear();
        
        if (data.messages && data.messages.length > 0) {
            data.messages.forEach(msg => {
                existingMessageIds.add(msg.id);
                container.appendChild(createMessageElement(msg));
            });
            lastMessageTime = data.messages[data.messages.length - 1].created_at;
        } else {
            container.innerHTML = '<div class="loading-indicator"><i class="fas fa-comment-dots" style="font-size: 2rem; margin-bottom: 12px; display: block;"></i><p>No messages yet</p><small>Send a message to start the conversation</small></div>';
        }
        
        scrollToBottom();
        
    } catch (error) {
        console.error('Failed to load messages:', error);
        document.getElementById('messagesContainer').innerHTML = `
            <div class="loading-indicator">
                <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 12px; display: block;"></i>
                <p>Failed to load messages</p>
                <button class="btn btn-primary btn-sm mt-2" onclick="location.reload()">Retry</button>
            </div>
        `;
    }
}

function createMessageElement(msg, isPending = false, tempId = null) {
    const div = document.createElement('div');
    div.className = `message ${msg.is_sender ? 'message-sent' : 'message-received'}`;
    if (isPending) {
        div.classList.add('message-sending');
        div.dataset.tempId = tempId;
    } else {
        div.dataset.messageId = msg.id;
    }
    
    if (msg.message_type === 'text') {
        div.innerHTML = `
            <div class="message-bubble">
                <div>${escapeHtml(msg.content)}</div>
                <div class="message-time">
                    ${formatTime(msg.created_at)}
                    ${msg.is_sender ? getStatusIcon(msg.status, isPending) : ''}
                </div>
            </div>
        `;
    } else if (msg.message_type === 'voice') {
        div.innerHTML = `
            <div class="message-bubble">
                <div class="voice-note">
                    <button class="play-voice-btn" data-url="${msg.voice_url || ''}" data-duration="${msg.voice_duration || 0}">
                        <i class="fas fa-play"></i>
                    </button>
                    <div class="voice-waveform">
                        <div class="voice-progress"></div>
                    </div>
                    <span class="voice-duration">${formatDuration(msg.voice_duration || 0)}</span>
                </div>
                <div class="message-time">
                    ${formatTime(msg.created_at)}
                    ${msg.is_sender ? getStatusIcon(msg.status, isPending) : ''}
                </div>
            </div>
        `;
        
        if (!isPending && msg.voice_url) {
            const playBtn = div.querySelector('.play-voice-btn');
            const progressBar = div.querySelector('.voice-progress');
            let audio = null;
            let isPlaying = false;
            
            playBtn.addEventListener('click', () => {
                if (!audio) {
                    audio = new Audio(msg.voice_url);
                    audio.addEventListener('timeupdate', () => {
                        const percent = (audio.currentTime / audio.duration) * 100;
                        progressBar.style.width = `${percent}%`;
                    });
                    audio.addEventListener('ended', () => {
                        playBtn.innerHTML = '<i class="fas fa-play"></i>';
                        isPlaying = false;
                        progressBar.style.width = '0%';
                    });
                }
                
                if (isPlaying) {
                    audio.pause();
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                    isPlaying = false;
                } else {
                    audio.play();
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    isPlaying = true;
                }
            });
        }
    } else if (msg.message_type === 'system') {
        div.className = 'message-system';
        div.innerHTML = `<div class="system-message">${escapeHtml(msg.content)}</div>`;
    }
    
    return div;
}

function getStatusIcon(status, isPending) {
    if (isPending) {
        return `<span class="sending-indicator"><i class="fas fa-circle"></i> Sending...</span>`;
    }
    
    switch(status) {
        case 'sent':
            return `<span class="message-status status-sent"><i class="fas fa-check"></i></span>`;
        case 'delivered':
            return `<span class="message-status status-delivered"><i class="fas fa-check-double"></i></span>`;
        case 'read':
            return `<span class="message-status status-read"><i class="fas fa-check-double"></i></span>`;
        default:
            return '';
    }
}

// Voice Recording
async function startRecording() {
    try {
        currentStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') 
            ? 'audio/webm;codecs=opus' 
            : 'audio/webm';
        
        mediaRecorder = new MediaRecorder(currentStream, { 
            mimeType,
            audioBitsPerSecond: 32000
        });
        audioChunks = [];
        recordingSeconds = 0;
        
        mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
                audioChunks.push(event.data);
            }
        };
        
        mediaRecorder.start(100);
        
        document.getElementById('recordBtn').classList.add('recording');
        document.getElementById('recordingModal').style.display = 'flex';
        document.getElementById('recordingTimer').textContent = '0:00';
        
        recordingTimer = setInterval(() => {
            recordingSeconds++;
            const mins = Math.floor(recordingSeconds / 60);
            const secs = recordingSeconds % 60;
            document.getElementById('recordingTimer').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
        
    } catch (error) {
        console.error('Microphone error:', error);
        showToast('Microphone access denied', 'error');
    }
}

function stopRecordingAndSend() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        if (recordingTimer) {
            clearInterval(recordingTimer);
            recordingTimer = null;
        }
        
        document.getElementById('recordingModal').style.display = 'none';
        document.getElementById('recordBtn').classList.remove('recording');
        
        mediaRecorder.onstop = async () => {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            
            if (audioChunks.length > 0 && recordingSeconds >= 1) {
                await sendVoiceNoteWithIndicator();
            } else if (recordingSeconds < 1) {
                showToast('Recording too short', 'error');
            }
        };
        
        mediaRecorder.stop();
    }
}

function stopRecordingAndCancel() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        if (recordingTimer) {
            clearInterval(recordingTimer);
            recordingTimer = null;
        }
        
        document.getElementById('recordingModal').style.display = 'none';
        document.getElementById('recordBtn').classList.remove('recording');
        
        mediaRecorder.onstop = () => {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            audioChunks = [];
            showToast('Recording cancelled', 'info');
        };
        
        mediaRecorder.stop();
    }
}

async function sendVoiceNoteWithIndicator() {
    const tempId = 'temp_' + Date.now();
    const tempMessage = {
        id: tempId,
        is_sender: true,
        message_type: 'voice',
        voice_duration: recordingSeconds,
        voice_url: null,
        created_at: new Date().toISOString(),
        status: 'sending'
    };
    
    const container = document.getElementById('messagesContainer');
    const tempElement = createMessageElement(tempMessage, true, tempId);
    container.appendChild(tempElement);
    scrollToBottom();
    
    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
    const formData = new FormData();
    formData.append('voice_note', audioBlob);
    formData.append('message_type', 'voice');
    formData.append('voice_duration', recordingSeconds);
    
    try {
        const response = await fetch(`/chat/${chatId}/send/`, {
            method: 'POST',
            headers: { 'X-CSRFToken': csrftoken },
            body: formData
        });
        
        const data = await response.json();
        if (data.success) {
            const tempElement = document.querySelector(`[data-temp-id="${tempId}"]`);
            if (tempElement) {
                // Remove temp message and add real one
                tempElement.remove();
                if (!existingMessageIds.has(data.message.id)) {
                    existingMessageIds.add(data.message.id);
                    const realElement = createMessageElement(data.message);
                    container.appendChild(realElement);
                }
            }
            lastMessageTime = data.message.created_at;
            scrollToBottom();
            showToast('Voice note sent!', 'success');
        } else {
            const tempElement = document.querySelector(`[data-temp-id="${tempId}"]`);
            if (tempElement) tempElement.remove();
            showToast('Failed to send voice note', 'error');
        }
    } catch (error) {
        console.error('Send voice note failed:', error);
        const tempElement = document.querySelector(`[data-temp-id="${tempId}"]`);
        if (tempElement) tempElement.remove();
        showToast('Failed to send voice note', 'error');
    }
}

// Send text message
async function sendTextMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    
    if (!content) return;
    
    const tempId = 'temp_' + Date.now();
    const tempMessage = {
        id: tempId,
        is_sender: true,
        message_type: 'text',
        content: content,
        created_at: new Date().toISOString(),
        status: 'sending'
    };
    
    const container = document.getElementById('messagesContainer');
    const tempElement = createMessageElement(tempMessage, true, tempId);
    container.appendChild(tempElement);
    scrollToBottom();
    
    input.value = '';
    
    const formData = new FormData();
    formData.append('content', content);
    formData.append('message_type', 'text');
    
    try {
        const response = await fetch(`/chat/${chatId}/send/`, {
            method: 'POST',
            headers: { 'X-CSRFToken': csrftoken },
            body: formData
        });
        
        const data = await response.json();
        if (data.success) {
            const tempElement = document.querySelector(`[data-temp-id="${tempId}"]`);
            if (tempElement) {
                tempElement.remove();
                if (!existingMessageIds.has(data.message.id)) {
                    existingMessageIds.add(data.message.id);
                    const realElement = createMessageElement(data.message);
                    container.appendChild(realElement);
                }
            }
            lastMessageTime = data.message.created_at;
            scrollToBottom();
        } else {
            const tempElement = document.querySelector(`[data-temp-id="${tempId}"]`);
            if (tempElement) tempElement.remove();
            showToast('Failed to send message', 'error');
        }
    } catch (error) {
        console.error('Send failed:', error);
        const tempElement = document.querySelector(`[data-temp-id="${tempId}"]`);
        if (tempElement) tempElement.remove();
        showToast('Failed to send message', 'error');
    }
}

// Poll for new messages - FIXED to prevent duplicates
function setupPolling() {
    if (pollingInterval) clearInterval(pollingInterval);
    
    pollingInterval = setInterval(async () => {
        if (document.hasFocus()) {
            try {
                let url = `/chat/${chatId}/api/`;
                if (lastMessageTime) {
                    url += `?since=${encodeURIComponent(lastMessageTime)}`;
                }
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.messages && data.messages.length > 0) {
                    const container = document.getElementById('messagesContainer');
                    let newLastMessageTime = lastMessageTime;
                    
                    data.messages.forEach(msg => {
                        // Only add if not already in the DOM
                        if (!existingMessageIds.has(msg.id)) {
                            existingMessageIds.add(msg.id);
                            const messageElement = createMessageElement(msg);
                            container.appendChild(messageElement);
                            
                            // Update last message time
                            if (msg.created_at > newLastMessageTime) {
                                newLastMessageTime = msg.created_at;
                            }
                        }
                    });
                    
                    lastMessageTime = newLastMessageTime;
                    scrollToBottom();
                    
                    if (window.updateChatBadge) {
                        window.updateChatBadge();
                    }
                }
            } catch (error) {
                console.error('Polling failed:', error);
            }
        }
    }, 2000);
}

// Helper functions
function scrollToBottom() {
    const container = document.getElementById('messagesContainer');
    container.scrollTop = container.scrollHeight;
}

function formatTime(isoString) {
    const date = new Date(isoString);
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDuration(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function showToast(message, type = 'success') {
    if (window.showToast) {
        window.showToast(message, type);
    } else {
        alert(message);
    }
}

// Event listeners
document.addEventListener('DOMContentLoaded', () => {
    loadMessages();
    setupPolling();
    
    // Send text message
    document.getElementById('sendBtn').addEventListener('click', sendTextMessage);
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendTextMessage();
        }
    });
    
    // Voice recording
    const recordBtn = document.getElementById('recordBtn');
    recordBtn.addEventListener('click', () => {
        if (!mediaRecorder || mediaRecorder.state !== 'recording') {
            startRecording();
        }
    });
    
    document.getElementById('sendRecordingBtn').addEventListener('click', () => {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            stopRecordingAndSend();
        }
    });
    
    document.getElementById('cancelRecordingBtn').addEventListener('click', () => {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            stopRecordingAndCancel();
        }
    });
});
</script>
