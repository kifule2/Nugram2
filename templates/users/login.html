{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container">
    <div class="row justify-content-center py-5">
        <div class="col-md-8 col-lg-6">
            <div class="bg-white p-5 rounded shadow wow fadeInUp" data-wow-delay="0.1s">
                <div class="text-center mb-5">
                    <h1 class="display-6 mb-4"><i class="fas fa-sign-in-alt text-primary me-2"></i>Login to Nusu</h1>
                    <p class="text-muted">Access your social finance dashboard</p>
                </div>
                
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                    </div>
                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary btn-lg">Login</button>
                    </div>
                    <div class="text-center">
                        <a href="{% url 'users:password_reset' %}" class="text-decoration-none">Forgot Password?</a>
                        <p class="mt-3">Don't have an account? <a href="{% url 'users:register' %}" class="text-decoration-none">Register</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
