{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container">
    <div class="row justify-content-center py-5">
        <div class="col-md-8 col-lg-6">
            <div class="bg-white p-5 rounded shadow wow fadeInUp" data-wow-delay="0.1s">
                <h1 class="display-6 mb-4">Send Tokens</h1>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label">Recipient Username</label>
                        {{ form.username }}
                        <div class="form-text">Enter the username of the recipient</div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Amount to Send</label>
                        <div class="input-group">
                            {{ form.amount }}
                            <span class="input-group-text">NSU</span>
                        </div>
                        <div class="form-text">Current balance: {{ request.user.userprofile.token_balance }} NSU</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="fas fa-paper-plane me-2"></i> Send Tokens
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
